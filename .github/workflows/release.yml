name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-native:
    needs: [ci]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: memory-agent-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: memory-agent-aarch64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            name: memory-agent-x86_64-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            name: memory-agent-aarch64-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: memory-agent-x86_64-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - run: cargo build --release -p memory-agent --target ${{ matrix.target }}
      - name: Copy artifact (unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/memory-agent ${{ matrix.name }}
      - name: Copy artifact (windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/memory-agent.exe ${{ matrix.name }}.exe
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  build-wasm:
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli
      - name: Build memory-wasm
        run: cargo build --release -p memory-wasm --target wasm32-wasip1
      - run: cp target/wasm32-wasip1/release/memory_wasm.wasm memory-wasm.wasm
      - uses: actions/upload-artifact@v4
        with:
          name: memory-wasm
          path: memory-wasm.wasm

  release:
    needs: [build-native, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            memory-agent-x86_64-linux/memory-agent-x86_64-linux
            memory-agent-aarch64-linux/memory-agent-aarch64-linux
            memory-agent-x86_64-darwin/memory-agent-x86_64-darwin
            memory-agent-aarch64-darwin/memory-agent-aarch64-darwin
            memory-agent-x86_64-windows/memory-agent-x86_64-windows.exe
            memory-wasm/memory-wasm.wasm

  publish:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish memory-core
        run: cargo publish -p memory-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io to index memory-core
        run: sleep 30
      - name: Publish memory-agent
        run: cargo publish -p memory-agent
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
