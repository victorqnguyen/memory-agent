name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Set OPENSSL_DIR (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $path = Get-Item "C:\Program Files\OpenSSL-Win64" -ErrorAction SilentlyContinue
          if (-not $path) { $path = Get-Item "C:\Program Files\OpenSSL" }
          echo "OPENSSL_DIR=$($path.FullName)" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV
      - run: cargo clippy -- -D warnings
      - run: cargo test
      - name: Audit dependencies
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cargo-audit && cargo audit

  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p memory-agent

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - run: cross build -p memory-agent --target aarch64-unknown-linux-gnu
        env:
          OPENSSL_LIB_DIR: /usr/lib/aarch64-linux-gnu
          OPENSSL_INCLUDE_DIR: /usr/include
          PKG_CONFIG_ALLOW_CROSS: "1"
